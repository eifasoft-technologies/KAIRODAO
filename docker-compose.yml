services:
  postgres:
    image: timescale/timescaledb:latest-pg14
    restart: unless-stopped
    environment:
      POSTGRES_USER: kairo_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: kairo_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kairo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kairo_admin -d kairo_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - kairo_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://kairo_admin:${DB_PASSWORD}@postgres:5432/kairo_prod
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - RPC_URL=${RPC_URL}
      - RPC_WS_URL=${RPC_WS_URL}
      - CHAIN_ID=${CHAIN_ID}
      - INDEXER_PRIVATE_KEY=${INDEXER_PRIVATE_KEY}
      - KAIRO_TOKEN_ADDRESS=${KAIRO_TOKEN_ADDRESS}
      - AUXFUND_ADDRESS=${AUXFUND_ADDRESS}
      - STAKING_MANAGER_ADDRESS=${STAKING_MANAGER_ADDRESS}
      - AFFILIATE_DISTRIBUTOR_ADDRESS=${AFFILIATE_DISTRIBUTOR_ADDRESS}
      - CMS_ADDRESS=${CMS_ADDRESS}
      - P2P_ESCROW_ADDRESS=${P2P_ESCROW_ADDRESS}
      - SYSTEM_WALLET=${SYSTEM_WALLET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kairo_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
        - NEXT_PUBLIC_CHAIN_ID=${CHAIN_ID}
        - NEXT_PUBLIC_KAIRO_TOKEN=${KAIRO_TOKEN_ADDRESS}
        - NEXT_PUBLIC_AUXFUND=${AUXFUND_ADDRESS}
        - NEXT_PUBLIC_STAKING_MANAGER=${STAKING_MANAGER_ADDRESS}
        - NEXT_PUBLIC_AFFILIATE_DISTRIBUTOR=${AFFILIATE_DISTRIBUTOR_ADDRESS}
        - NEXT_PUBLIC_CMS=${CMS_ADDRESS}
        - NEXT_PUBLIC_P2P_ESCROW=${P2P_ESCROW_ADDRESS}
        - NEXT_PUBLIC_USDT=${USDT_ADDRESS}
        - NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${WALLETCONNECT_PROJECT_ID}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - kairo_network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - kairo_network
    command:
      - sh
      - -c
      - |
        if [ ! -f /etc/letsencrypt/live/kairodao.com/fullchain.pem ]; then
          mkdir -p /etc/letsencrypt/live/kairodao.com
          openssl req -x509 -nodes -days 1 -newkey rsa:2048 -keyout /etc/letsencrypt/live/kairodao.com/privkey.pem -out /etc/letsencrypt/live/kairodao.com/fullchain.pem -subj '/CN=kairodao.com'
        fi
        nginx -g 'daemon off;'

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - nginx
    entrypoint:
      - sh
      - -c
      - |
        trap exit TERM
        sleep 10
        certbot certonly --webroot --webroot-path=/var/www/certbot -d kairodao.com -d www.kairodao.com --email admin@kairodao.com --agree-tos --no-eff-email --keep-existing --non-interactive
        while :; do certbot renew; sleep 12h & wait $${!}; done

volumes:
  postgres_data:
  redis_data:
  certbot_conf:
  certbot_www:

networks:
  kairo_network:
    driver: bridge
