version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg14
    restart: unless-stopped
    environment:
      POSTGRES_USER: kairo_admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kairo_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - kairo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kairo_admin -d kairo_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - kairo_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://kairo_admin:password@postgres:5432/kairo_dev
      - REDIS_URL=redis://redis:6379
      - RPC_URL=${RPC_URL:-https://opbnb-testnet-rpc.bnbchain.org}
      - RPC_WS_URL=${RPC_WS_URL:-wss://opbnb-testnet-rpc.bnbchain.org}
      - CHAIN_ID=${CHAIN_ID:-5611}
      - INDEXER_PRIVATE_KEY=${INDEXER_PRIVATE_KEY:-}
      - KAIRO_TOKEN_ADDRESS=${KAIRO_TOKEN_ADDRESS:-}
      - LIQUIDITY_POOL_ADDRESS=${LIQUIDITY_POOL_ADDRESS:-}
      - STAKING_MANAGER_ADDRESS=${STAKING_MANAGER_ADDRESS:-}
      - AFFILIATE_DISTRIBUTOR_ADDRESS=${AFFILIATE_DISTRIBUTOR_ADDRESS:-}
      - CMS_ADDRESS=${CMS_ADDRESS:-}
      - ATOMIC_P2P_ADDRESS=${ATOMIC_P2P_ADDRESS:-}
      - SYSTEM_WALLET=${SYSTEM_WALLET:-}
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
      - ./backend/package-lock.json:/app/package-lock.json
      - ./backend/tsconfig.json:/app/tsconfig.json
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    networks:
      - kairo_network

  frontend:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=ws://localhost:4000/ws
      - NEXT_PUBLIC_CHAIN_ID=${CHAIN_ID:-5611}
      - NEXT_PUBLIC_KAIRO_TOKEN=${KAIRO_TOKEN_ADDRESS:-}
      - NEXT_PUBLIC_LIQUIDITY_POOL=${LIQUIDITY_POOL_ADDRESS:-}
      - NEXT_PUBLIC_STAKING_MANAGER=${STAKING_MANAGER_ADDRESS:-}
      - NEXT_PUBLIC_AFFILIATE_DISTRIBUTOR=${AFFILIATE_DISTRIBUTOR_ADDRESS:-}
      - NEXT_PUBLIC_CMS=${CMS_ADDRESS:-}
      - NEXT_PUBLIC_ATOMIC_P2P=${ATOMIC_P2P_ADDRESS:-}
      - NEXT_PUBLIC_USDT=${USDT_ADDRESS:-}
      - NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${WALLETCONNECT_PROJECT_ID:-}
      - NEXT_PUBLIC_SYSTEM_WALLET=${SYSTEM_WALLET:-}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/next.config.js:/app/next.config.js
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - kairo_network

volumes:
  postgres_data:
  redis_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  kairo_network:
    driver: bridge
